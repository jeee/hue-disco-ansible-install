---
- name: Install optional direct-bridge networking packages
  ansible.builtin.apt:
    name:
      - dnsmasq-base
      - nftables
      - isc-dhcp-client
    state: present
    update_cache: true
  when: rpi_network.enabled | default(false) | bool

- name: Deploy Hue bridge direct network environment
  ansible.builtin.template:
    src: hue-bridge-direct-net.env.j2
    dest: /etc/default/hue-bridge-direct-net
    owner: root
    group: root
    mode: "0644"
  when: rpi_network.enabled | default(false) | bool

- name: Deploy Hue bridge direct network helper
  ansible.builtin.template:
    src: hue-bridge-direct-net.sh.j2
    dest: /usr/local/sbin/hue-bridge-direct-net
    owner: root
    group: root
    mode: "0755"
  when: rpi_network.enabled | default(false) | bool

- name: Deploy secondary DHCP lease hook
  ansible.builtin.template:
    src: hue-bridge-direct-dhclient-script.j2
    dest: /usr/local/sbin/hue-bridge-direct-dhclient-script
    owner: root
    group: root
    mode: "0755"
  when: rpi_network.enabled | default(false) | bool

- name: Remove old NetworkManager dispatcher hook for direct bridge mode
  ansible.builtin.file:
    path: /etc/NetworkManager/dispatcher.d/90-hue-bridge-direct
    state: absent

- name: Deploy Hue bridge direct network systemd unit
  ansible.builtin.template:
    src: hue-bridge-direct-net.service.j2
    dest: /etc/systemd/system/hue-bridge-direct-net.service
    owner: root
    group: root
    mode: "0644"
  when: rpi_network.enabled | default(false) | bool
  notify:
    - daemon-reload

- name: Disable old periodic Hue bridge direct network reconciliation
  ansible.builtin.systemd:
    name: hue-bridge-direct-net.timer
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false

- name: Remove old Hue bridge direct network systemd timer
  ansible.builtin.file:
    path: /etc/systemd/system/hue-bridge-direct-net.timer
    state: absent
  notify:
    - daemon-reload

- name: Trigger Hue bridge direct network reconciliation once when explicitly enabled
  ansible.builtin.command:
    argv:
      - /usr/bin/systemctl
      - start
      - --no-block
      - hue-bridge-direct-net.service
  changed_when: false
  when: rpi_network.enabled | default(false) | bool

- name: Disable Hue bridge direct network helper by default
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - hue-bridge-direct-net.timer
    - hue-bridge-direct-net.service
  failed_when: false
  when: not (rpi_network.enabled | default(false) | bool)

- name: Remove NetworkManager dispatcher hook when direct bridge mode is disabled
  ansible.builtin.file:
    path: /etc/NetworkManager/dispatcher.d/90-hue-bridge-direct
    state: absent
  when: not (rpi_network.enabled | default(false) | bool)
