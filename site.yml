- hosts: raspberrypi
  become: true
  vars_files:
    - group_vars/all.yml
  roles:
    - role: python_venv
    # rpi_network is intentionally not part of the default install path.
    # It can alter live connectivity on headless Pis and must only be run explicitly
    # after the direct-bridge design has been validated for the target network.
    - role: tor_ssh
    - role: hue_disco
    - role: web_interface
    - role: systemd_service
